name: NoiseLog
options:
  bundleIdPrefix: com.will-llc
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    SWIFT_VERSION: "5.9"
targets:
  NoiseLog:
    type: application
    platform: iOS
    sources:
      - NoiseLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.will-llc.NoiseLog
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "騒音レベルの測定と録音のためにマイクを使用します"
        INFOPLIST_KEY_CFBundleDisplayName: "騒音ログ"
    info:
      path: NoiseLog/Info.plist
      properties:
        NSMicrophoneUsageDescription: "騒音レベルの測定と録音のためにマイクを使用します"
        CFBundleDisplayName: "騒音ログ"
        UIBackgroundModes:
          - audio
